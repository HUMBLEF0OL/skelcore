name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enforce changeset for package-impacting PRs
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          CHANGED_FILES=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD")

          if echo "$CHANGED_FILES" | grep -Eq '^(packages/|package.json$|pnpm-lock.yaml$|pnpm-workspace.yaml$|turbo.json$|tsconfig.json$|tsconfig.base.json$)'; then
            if ! echo "$CHANGED_FILES" | grep -Eq '^\.changeset/[^/]+\.md$'; then
              echo "Package-impacting changes detected but no changeset file found in .changeset/*.md"
              exit 1
            fi
          fi

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 21
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Turbo quality gates
        run: pnpm turbo run test lint typecheck build

      - name: Manifest quality gate
        run: |
          mkdir -p .tmp/ghostframe
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            git show "origin/${{ github.base_ref }}:apps/demo/lib/ghostframe/generated/manifest.json" > .tmp/ghostframe/base-manifest.json
            QUALITY_BASE_MANIFEST=.tmp/ghostframe/base-manifest.json QUALITY_CANDIDATE_MANIFEST=apps/demo/lib/ghostframe/generated/manifest.json pnpm quality:gate
          else
            pnpm quality:gate
          fi

      - name: Upload quality artifacts
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports
          path: .tmp/ghostframe
